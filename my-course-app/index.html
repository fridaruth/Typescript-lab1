<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-course-app</title>
  </head>
  <body>
    <div id="app">
      <h1>Mina Kurser</h1>
      <form id="course-form">
        <input type="text" id="code" placeholder="Kurskod (t.ex. DT211G)" required>
        <input type="text" id="name" placeholder="Kursnamn" required>
        <select id="progression">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
        <input type="url" id="syllabus" placeholder="URL till kursplan" required>
        <button type="submit">Lägg till kurs</button>
      </form>

      <table id="course-list">
        <thead>
          <tr>
            <th>Kurskod</th>
            <th>Kursnamn</th>
            <th>Progression</th>
            <th>Kursplan</th>
          </tr>
        </thead>
        <tbody>
          <tbody id="course-tbody">
        </tbody>
      </table>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
